[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @sivraj/api build"
watchPatterns = [
  "/apps/api/**",
  "/packages/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/tsconfig.base.json"
]

[deploy]
startCommand = "pnpm start:api"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
