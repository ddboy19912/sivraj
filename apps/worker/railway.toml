[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @sivraj/worker install:walrus && pnpm --filter @sivraj/worker build"
watchPatterns = [
  "/apps/worker/**",
  "/packages/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/tsconfig.base.json"
]

[deploy]
startCommand = "pnpm start:worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
